<p-toast></p-toast>
<p-toolbar styleClass="mb-6" class="w-100">
  <ng-template #start>
    <p-button label="New" icon="pi pi-plus" severity="secondary" class="mr-2" (onClick)="openNew()" />
    <p-button severity="secondary" label="Delete" icon="pi pi-trash" outlined (onClick)="deleteSelectedLectures()"
      [disabled]="!selectedLectures || !selectedLectures.length" />
  </ng-template>

  <ng-template #end>
    <p-button label="Export" icon="pi pi-upload" severity="secondary" (onClick)="exportCSV()" />
  </ng-template>
</p-toolbar>

@if(false){
<p-table #dt [value]="lectures()" [loading]="loading()" [rows]="10" [columns]="cols" [paginator]="true"
  [globalFilterFields]="['name', 'country.title', 'representative.title', 'status']"
  [tableStyle]="{ 'min-width': '75rem' }" [(selection)]="selectedLectures" [rowHover]="true" dataKey="id"
  currentPageReportTemplate="Showing {first} to {last} of {totalRecords} lectures" [showCurrentPageReport]="true"
  [rowsPerPageOptions]="[10, 20, 30]">
  <ng-template #caption>
    <div class="flex items-center justify-between">
      <h5 class="m-0">Manage Lectures</h5>
      <p-iconfield>
        <p-inputicon styleClass="pi pi-search" />
        <input pInputText type="text" (input)="onGlobalFilter(dt, $event)" placeholder="Search..." />
      </p-iconfield>
    </div>
  </ng-template>
  <ng-template #header>
    <tr>
      <th style="width: 3rem">
        <p-tableHeaderCheckbox />
      </th>
      <th pSortableColumn="id" style="width: 6rem">
        id
        <p-sortIcon field="id" />
      </th>
      <th pSortableColumn="order" style="width: 6rem">
        Order
        <p-sortIcon field="order" />
      </th>

      <th pSortableColumn="title" style="flex: 1">
        Title
        <p-sortIcon field="title" />
      </th>

      <th style="min-width: 2rem"></th>
    </tr>
  </ng-template>
  <ng-template #body let-lecture>
    <tr>
      <td style="width: 3rem">
        <p-tableCheckbox [value]="lecture" />
      </td>
      <td style="min-width: 6rem">{{ lecture.id }}</td>
      <td style="min-width: 6rem">{{ lecture.order }}</td>
      <td>{{ lecture.title }}</td>


      <td style="min-width: 2rem">
        <p-button icon="pi pi-pencil" class="mx-2" [rounded]="true" [outlined]="true" (click)="editLecture(lecture)" />
        <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true"
          (click)="deleteLecture(lecture)" />
      </td>
    </tr>
  </ng-template>
</p-table>
}

        <div class="card">
            <div class="font-semibold text-xl mb-4">Row Expansion</div>
            <p-table [value]="sections()" [loading]="loading()" [rows]="10" dataKey="id" [tableStyle]="{ 'min-width': '60rem' }" [expandedRowKeys]="expandedRows">
                <ng-template #caption>
                    <button pButton icon="pi pi-fw {{ isExpanded ? 'pi-minus' : 'pi-plus' }}" label="{{ isExpanded ? 'Collapse All' : 'Expand All' }}" (click)="expandAll()"></button>
                    <div class="flex table-header"></div>
                </ng-template>
                <ng-template #header>
                  <tr>
                    <th style="width: 3rem">
                   <!--    <p-tableHeaderCheckbox /> -->
                    </th>
                    <th pSortableColumn="id" style="width: 6rem">
                      id
                      <p-sortIcon field="id" />
                    </th>

                    <th pSortableColumn="title" style="flex: 1">
                      Title
                      <p-sortIcon field="title" />
                    </th>

                    <th style="min-width: 2rem"></th>
                  </tr>
                </ng-template>
                <ng-template #body let-section let-expanded="expanded">
                    <tr>
                      <td style="width: 3rem">
                      <!--   <p-tableCheckbox [value]="section" /> -->

                        <p-button type="button" pRipple [pRowToggler]="section" [text]="true" [rounded]="true" [plain]="true" [icon]="expanded ? 'pi pi-chevron-down' : 'pi pi-chevron-right'" />

                      </td>
                      <td style="min-width: 6rem">{{ section.id }}</td>
                      <td>{{ section.title }}</td>


                      <td style="min-width: 2rem">
                        <p-button icon="pi pi-pencil" class="mx-2" [rounded]="true" [outlined]="true" (click)="editLecture(section)" />
                        <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true" (click)="deleteLecture(section)" />
                      </td>
                    </tr>
                </ng-template>
                <ng-template #expandedrow let-section>
                    <tr>
                        <td colspan="7">
                            <div class="p-4">
                                <h5>Lectures of {{ section.title }}</h5>
                                <p-table [value]="section.lectures" dataKey="id">
                                    <ng-template #header>
                                        <tr>
                                            <th pSortableColumn="id">Id <p-sortIcon field="id" /></th>
                                            <th pSortableColumn="title"> Title
                                                <p-sortIcon field="title" />
                                            </th>

                                            <th style="width: 4rem"></th>
                                        </tr>
                                    </ng-template>
                                    <ng-template #body let-lecture>
                                        <tr>
                                            <td>{{ lecture.id }}</td>
                                            <td style="max-width: 14rem">{{ lecture.title }}</td>
                                            <td style="min-width: 4rem">
                                              <p-button icon="pi pi-pencil" class="mx-2" [rounded]="true" [outlined]="true" (click)="editLecture(lecture)" />
                                              <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true"
                                                  (click)="deleteLecture(lecture)" />
                                            </td>
                                        </tr>
                                    </ng-template>
                                    <ng-template #emptymessage>
                                        <tr>
                                            <td colspan="6">There are no order for this product yet.</td>
                                        </tr>
                                    </ng-template>
                                </p-table>
                            </div>
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </div>

<p-dialog [visible]="lectureDialog()" [style]="{ width: '950px' }" header="Lecture Details" [modal]="true">

  <ng-template #content>
    <form [formGroup]="lectureForm" enctype="multipart/form-data">
      <div class="flex flex-row gap-6 w-full">
        <div class="flex flex-col j gap-1 flex-1">
          <app-form-input [control]="$any(lectureForm.get('title'))" label="Title"> </app-form-input>
          <app-form-input [control]="$any(lectureForm.get('description'))" label="Description"> </app-form-input>
          <app-form-input [control]="$any(lectureForm.get('order'))" label="Order" type="number"> </app-form-input>
          <app-form-input [control]="$any(lectureForm.get('url'))" label="lecture url" type="text"> </app-form-input>

        </div>

        <div class="flex flex-col gap-1 flex-1">
          <app-form-input [control]="$any(lectureForm.get('sectionId'))" label="Section" type="select"
          [options]="sections()"
          > </app-form-input>

        </div>
      </div>
    </form>
  </ng-template>

  <ng-template #footer>
    <p-button label="Cancel" icon="pi pi-times" text (click)="hideDialog()" />
    <p-button label="Save" icon="pi pi-check" (click)="saveLecture()" [loading]="loadingSave()" />
  </ng-template>

</p-dialog>

<p-confirmdialog [style]="{ width: '450px' }" />
