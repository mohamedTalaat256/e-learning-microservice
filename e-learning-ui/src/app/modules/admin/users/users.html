<p-toolbar styleClass="mb-6">
  <ng-template #start>
    <p-button label="New" icon="pi pi-plus" severity="secondary" class="mr-2" (onClick)="openNew()" />
    <p-button severity="secondary" label="Delete" icon="pi pi-trash" outlined (onClick)="deleteSelectedUsers()"
      [disabled]="!selectedUsers || !selectedUsers.length" />
  </ng-template>

  <ng-template #end>
    <p-button label="Export" icon="pi pi-upload" severity="secondary" (onClick)="exportCSV()" />
  </ng-template>
</p-toolbar>

<p-table #dt [value]="users()" [loading]="loading()" [rows]="10" [columns]="cols" [paginator]="true"
  [globalFilterFields]="['name', 'country.title', 'representative.title', 'status']"
  [tableStyle]="{ 'min-width': '75rem' }" [(selection)]="selectedUsers" [rowHover]="true" dataKey="id"
  currentPageReportTemplate="Showing {first} to {last} of {totalRecords} users" [showCurrentPageReport]="true"
  [rowsPerPageOptions]="[10, 20, 30]">
  <ng-template #caption>
    <div class="flex items-center justify-between">
      <h5 class="m-0">Manage Users</h5>
      <p-iconfield>
        <p-inputicon styleClass="pi pi-search" />
        <input pInputText type="text" (input)="onGlobalFilter(dt, $event)" placeholder="Search..." />
      </p-iconfield>
    </div>
  </ng-template>
  <ng-template #header>
    <tr>
      <th style="width: 3rem">
        <p-tableHeaderCheckbox />
      </th>
      <th pSortableColumn="id" style="width: 20rem">
        id
        <p-sortIcon field="id" />
      </th>
      <th pSortableColumn="username" style="min-width:8rem">
        username
        <p-sortIcon field="username" />
      </th>

      <th pSortableColumn="fullName" style="min-width:8rem">
        Name
        <p-sortIcon field="fullName" />
      </th>

      <th pSortableColumn="email" style="min-width:8rem">
        Email
        <p-sortIcon field="email" />
      </th>

      <th pSortableColumn="enabled" style="min-width:8rem">
        Status
        <p-sortIcon field="enabled" />
      </th>

      <th style="min-width: 12rem"></th>
    </tr>
  </ng-template>
  <ng-template #body let-user>
    <tr>
      <td style="width: 3rem">
        <p-tableCheckbox [value]="user" />
      </td>
      <td style="min-width: 20rem">{{ user.id }}</td>
      <td style="min-width: 8rem">{{ user.username }}</td>
      <td style="min-width: 8rem">
        <div class="flex items-center gap-2">
          <img [alt]="user.attributes.firstName" [src]="user.attributes.profilePicture[0]" class="circle-avatar-42"
            style="vertical-align: middle; " />
          <span class="image-text">{{ user.firstName +' ' + user.lastName }}</span>
        </div>
      </td>
      <td style="min-width: 8rem">{{ user.email }}</td>
      <td>
        <p-tag [value]="getStatusTitle(user.enabled)" [severity]="getSeverity(user.enabled)" />
      </td>
      <td>
        <p-button icon="pi pi-pencil" class="mr-2" [rounded]="true" [outlined]="true" (click)="editUser(user)" />
        <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true" (click)="deleteUser(user)" />
      </td>
    </tr>
  </ng-template>
</p-table>

<p-dialog [visible]="userDialog()" [style]="{ width: '950px' }" header="User Details" [modal]="true">

  <ng-template #content>
    <form [formGroup]="userForm">
      <div class="flex flex-row gap-6 w-full">
        <div class="flex flex-col gap-1 flex-1">
          <app-form-input [control]="$any(userForm.get('username'))" label="Username">
          </app-form-input>
          <app-form-input [control]="$any(userForm.get('email'))" label="Email">
          </app-form-input>
          <app-form-input [control]="$any(userForm.get('firstName'))" label="First Name">
          </app-form-input>
          <app-form-input [control]="$any(userForm.get('lastName'))" label="Last Name">
          </app-form-input>
          <app-form-input [control]="$any(userForm.get('password'))" label="Password" type="password">
          </app-form-input>


        </div>

        <div class="flex flex-col gap-1 flex-1">
           <app-form-input [control]="$any(userForm.get('role'))" label="Role" type="select" [options]="roles">
          </app-form-input>

          <ng-container *ngIf="userForm.value.profilePicture">
            <img [src]="userForm.value.profilePicture" [alt]="userForm.value.profilePicture"
              class="block m-auto pb-4" />
          </ng-container>
          <app-form-input [control]="$any(userForm.get('profilePicture'))" label="Profile Picture"> </app-form-input>

        </div>
      </div>
    </form>
  </ng-template>

  <ng-template #footer>
    <p-button label="Cancel" icon="pi pi-times" text (click)="hideDialog()" />
    <p-button label="Save" icon="pi pi-check" (click)="saveUser()" [loading]="loadingSave()" />
  </ng-template>


</p-dialog>


<p-confirmdialog [style]="{ width: '450px' }" />
